# This is a basic workflow to help you get started with Actions

name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: "30 15 * * 1-5"
    - cron: "30 05 * * 0,6"
jobs:
  
  build:
    
    runs-on: ubuntu-latest

    steps:
      
      - name: Get Postman files
        uses: actions/checkout@v6

      - name: Setup node.js
        uses: actions/setup-node@v6
        
      - name: Setup newman + html reporter
        shell: bash
        run: |
            npm install -g newman
            npm install -g newman-reporter-htmlextra
        
      - name: Run tests and get report
        shell: bash
        run: 'newman run Trello.postman_collection.json --environment Trello_Environment.postman_environment.json -r cli,htmlextra --reporter-htmlextra-export report.html' 
      
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report
          path: "*.html"
      
      - name: Send mail
        uses: dawidd6/action-send-mail@v16
        with:
          # Required mail server address if not connection_url:
          server_address: smtp.mail.ru
          # Server port, default 25:
          server_port: 465
          # Required sender
          from: 'metalnikov.pavel@mail.ru'
          to: metalnikov.pavel@mail.ru
          # Required mail subject:
          subject: Github Actions job result
          # Optional (recommended) mail server username:
          username: ${{secrets.MAIL_USERNAME}}
          # Optional (recommended) mail server password:
          password: ${{secrets.MAIL_PASSWORD}}
          # Optional attachments:
          attachments: report.html
          body: Postman collection report attached - ${{github.repository}}